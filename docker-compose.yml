services:
  timescaledb:
    image: timescale/timescaledb:2.15.2-pg16
    container_name: marketpulse-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketpulse
      POSTGRES_PASSWORD: marketpulse_dev_password
      POSTGRES_DB: marketpulse
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketpulse"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build: .
    container_name: marketpulse-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_HOST: timescaledb
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
  quote-poller:
    build: .
    container_name: marketpulse-quote-poller
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOST: timescaledb
    depends_on:
      timescaledb:
        condition: service_healthy
    command: ["python", "scripts/run_poller.py", "AAPL", "MSFT", "GOOGL", "--interval", "60"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import glob; import sys; sys.exit(0 if any('run_poller.py' in open(f).read() for f in glob.glob('/proc/[0-9]*/cmdline')) else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
  news-poller:
    build: .
    container_name: marketpulse-news-poller
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOST: timescaledb
    depends_on:
      timescaledb:
        condition: service_healthy
    command: ["python", "scripts/run_news_poller.py", "AAPL", "MSFT", "GOOGL", "--interval", "1800"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import glob; import sys; sys.exit(0 if any('run_news_poller.py' in open(f).read() for f in glob.glob('/proc/[0-9]*/cmdline')) else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
volumes:
  timescale_data:
